apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: mnist-classification-
spec:
  entrypoint: mnist-pipeline
  templates:
    - name: mnist-pipeline
      dag:
        tasks:
          - name: train-model
            template: train-model
          - name: evaluate-model
            template: evaluate-model
            dependencies: [train-model]

    - name: train-model
      container:
        image: pytorch/pytorch:2.0.1-cuda11.7-cudnn8-runtime
        command: [python, -c]
        args:
          - |
            import torch
            import torch.nn as nn
            import torch.optim as optim
            from torchvision import datasets, transforms
            from torch.utils.data import DataLoader

            # DeepNN model
            class DeepNN(nn.Module):
                def __init__(self):
                    super(DeepNN, self).__init__()
                    self.fc1 = nn.Linear(784, 512)
                    self.fc2 = nn.Linear(512, 256)
                    self.fc3 = nn.Linear(256, 128)
                    self.fc4 = nn.Linear(128, 10)
                    self.dropout = nn.Dropout(0.3)
                    self.relu = nn.ReLU()

                def forward(self, x):
                    x = x.view(-1, 784)
                    x = self.relu(self.fc1(x))
                    x = self.dropout(x)
                    x = self.relu(self.fc2(x))
                    x = self.dropout(x)
                    x = self.relu(self.fc3(x))
                    x = self.fc4(x)
                    return x

            # Load MNIST dataset
            transform = transforms.Compose([transforms.ToTensor()])
            train_ds = datasets.MNIST(root='/tmp/mnist', train=True, download=True, transform=transform)
            train_loader = DataLoader(train_ds, batch_size=64, shuffle=True)

            # Train
            model = DeepNN()
            criterion = nn.CrossEntropyLoss()
            optimizer = optim.Adam(model.parameters(), lr=0.001)

            for epoch in range(3):
                total_loss = 0
                for images, labels in train_loader:
                    optimizer.zero_grad()
                    outputs = model(images)
                    loss = criterion(outputs, labels)
                    loss.backward()
                    optimizer.step()
                    total_loss += loss.item()
                avg_loss = total_loss / len(train_loader)
                print(f"Epoch {epoch+1}, Loss: {avg_loss:.4f}")

            # Save model
            torch.save(model.state_dict(), '/tmp/mnist_model.pth')
            print("Model saved to /tmp/mnist_model.pth")

    - name: evaluate-model
      container:
        image: pytorch/pytorch:2.0.1-cuda11.7-cudnn8-runtime
        command: [python, -c]
        args:
          - |
            import torch
            import torch.nn as nn
            from torchvision import datasets, transforms
            from torch.utils.data import DataLoader

            class DeepNN(nn.Module):
                def __init__(self):
                    super(DeepNN, self).__init__()
                    self.fc1 = nn.Linear(784, 512)
                    self.fc2 = nn.Linear(512, 256)
                    self.fc3 = nn.Linear(256, 128)
                    self.fc4 = nn.Linear(128, 10)
                    self.dropout = nn.Dropout(0.3)
                    self.relu = nn.ReLU()

                def forward(self, x):
                    x = x.view(-1, 784)
                    x = self.relu(self.fc1(x))
                    x = self.dropout(x)
                    x = self.relu(self.fc2(x))
                    x = self.dropout(x)
                    x = self.relu(self.fc3(x))
                    x = self.fc4(x)
                    return x

            # Load test data
            transform = transforms.Compose([transforms.ToTensor()])
            test_ds = datasets.MNIST(root='/tmp/mnist', train=False, download=True, transform=transform)
            test_loader = DataLoader(test_ds, batch_size=64, shuffle=False)

            # Evaluate
            model = DeepNN()
            try:
                model.load_state_dict(torch.load('/tmp/mnist_model.pth'))
                print("Model loaded successfully")
            except:
                print("Model file not found, using random weights")

            model.eval()
            correct = 0
            total = 0
            with torch.no_grad():
                for images, labels in test_loader:
                    outputs = model(images)
                    _, predicted = torch.max(outputs, 1)
                    total += labels.size(0)
                    correct += (predicted == labels).sum().item()

            accuracy = 100 * correct / total
            print(f"Test Accuracy: {accuracy:.2f}%")