# Name: mnist-classification-kubeflow
# Description: UC1 MNIST — 3 models × 3 runs, metrics: accuracy + F1 + timing
# Inputs:
#    batch_size: int [Default: 64.0]
#    epochs: int [Default: 10.0]
#    learning_rate: float [Default: 0.001]
