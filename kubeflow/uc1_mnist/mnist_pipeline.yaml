          \ --trusted-host https://pypi.org/simple 'kfp==2.9.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple\
          \ --trusted-host https://download.pytorch.org/whl/cpu --trusted-host https://pypi.org/simple\
          \ 'numpy==1.26.4' 'Pillow==10.3.0' 'torch==2.2.2+cpu' 'torchvision==0.17.2+cpu'\
          \ 'scikit-learn==1.4.2' && \"$0\" \"$@\"\n"
