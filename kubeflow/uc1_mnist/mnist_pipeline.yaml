deploymentSpec:
  executors:
    exec-evaluate-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location --index-url https://download.pytorch.org/whl/cpu\
          \ --extra-index-url https://pypi.org/simple --trusted-host https://download.pytorch.org/whl/cpu\
          \ --trusted-host https://pypi.org/simple 'kfp==2.9.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple\
          \ --trusted-host https://download.pytorch.org/whl/cpu --trusted-host https://pypi.org/simple\
          \ 'numpy==1.26.4' 'Pillow==10.3.0' 'torch==2.2.2+cpu' 'torchvision==0.17.2+cpu'\
          \ 'scikit-learn==1.4.2' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model(\n    input_dataset: Input[Dataset],\n    input_model:\
          \   Input[Model],\n    model_name:    str,\n    run_id:        int,\n  \
          \  output_metrics: Output[Metrics],\n):\n    \"\"\"Evaluate model tr\xEA\
          n MNIST test set, log accuracy + F1-macro.\"\"\"\n    import time\n    import\
          \ torch\n    import torch.nn as nn\n    from torch.utils.data import TensorDataset,\
          \ DataLoader\n    from sklearn.metrics import accuracy_score, f1_score\n\
          \n    # \u2500\u2500 Model definitions \u2014 gi\u1ED1ng train step \u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    class SimpleNN(nn.Module):\n\
          \        def __init__(self):\n            super().__init__()\n         \
          \   self.fc1  = nn.Linear(784, 128)\n            self.fc2  = nn.Linear(128,\
          \ 10)\n            self.relu = nn.ReLU()\n        def forward(self, x):\n\
          \            x = x.view(-1, 784)\n            return self.fc2(self.relu(self.fc1(x)))\n\
          \n    class DeepNN(nn.Module):\n        def __init__(self):\n          \
          \  super().__init__()\n            self.fc1     = nn.Linear(784, 512)\n\
          \            self.fc2     = nn.Linear(512, 256)\n            self.fc3  \
          \   = nn.Linear(256, 128)\n            self.fc4     = nn.Linear(128, 10)\n\
          \            self.dropout = nn.Dropout(0.3)\n            self.relu    =\
          \ nn.ReLU()\n        def forward(self, x):\n            x = x.view(-1, 784)\n\
          \            x = self.relu(self.fc1(x)); x = self.dropout(x)\n         \
          \   x = self.relu(self.fc2(x)); x = self.dropout(x)\n            x = self.relu(self.fc3(x))\n\
          \            return self.fc4(x)\n\n    class CNN(nn.Module):\n        def\
          \ __init__(self):\n            super().__init__()\n            self.conv1\
          \   = nn.Conv2d(1, 32, kernel_size=3, padding=1)\n            self.bn1 \
          \    = nn.BatchNorm2d(32)\n            self.conv2   = nn.Conv2d(32, 64,\
          \ kernel_size=3, padding=1)\n            self.bn2     = nn.BatchNorm2d(64)\n\
          \            self.pool    = nn.MaxPool2d(2, 2)\n            self.fc1   \
          \  = nn.Linear(64 * 7 * 7, 128)\n            self.fc2     = nn.Linear(128,\
          \ 10)\n            self.relu    = nn.ReLU()\n            self.dropout =\
          \ nn.Dropout(0.3)\n        def forward(self, x):\n            x = self.pool(self.relu(self.bn1(self.conv1(x))))\n\
          \            x = self.pool(self.relu(self.bn2(self.conv2(x))))\n       \
          \     x = x.view(-1, 64 * 7 * 7)\n            return self.fc2(self.dropout(self.relu(self.fc1(x))))\n\
          \n    MODEL_CLASSES = {\"SimpleNN\": SimpleNN, \"DeepNN\": DeepNN, \"CNN\"\
          : CNN}\n\n    # \u2500\u2500 Load test data \u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\n    data        = torch.load(input_dataset.path)\n    test_images\
          \ = data[\"test_images\"].unsqueeze(1)\n    test_labels = data[\"test_labels\"\
          ]\n\n    test_ds     = TensorDataset(test_images, test_labels)\n    test_loader\
          \ = DataLoader(test_ds, batch_size=64, shuffle=False)\n\n    # \u2500\u2500\
          \ Evaluate \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\n    model = MODEL_CLASSES[model_name]()\n    model.load_state_dict(torch.load(input_model.path,\
          \ map_location=\"cpu\"))\n    model.eval()\n\n    all_preds, all_labels\
          \ = [], []\n    t0 = time.time()\n    with torch.no_grad():\n        for\
          \ images, labels in test_loader:\n            preds = model(images).argmax(dim=1)\n\
          \            all_preds.extend(preds.numpy())\n            all_labels.extend(labels.numpy())\n\
          \n    eval_time = round(time.time() - t0, 3)\n    accuracy  = round(accuracy_score(all_labels,\
          \ all_preds) * 100, 4)\n    f1        = round(f1_score(all_labels, all_preds,\
          \ average='macro') * 100, 4)\n\n    print(f\"[evaluate] model={model_name}\
          \ run={run_id}\")\n    print(f\"  Accuracy: {accuracy:.4f}%\")\n    print(f\"\
          \  F1-macro: {f1:.4f}%\")\n    print(f\"  Eval time: {eval_time}s\")\n\n\
          \    output_metrics.log_metric(\"accuracy\",          accuracy)\n    output_metrics.log_metric(\"\
          f1_macro\",          f1)\n    output_metrics.log_metric(\"eval_time_seconds\"\
          , eval_time)\n\n"
        image: python:3.11-slim
        resources:
          cpuLimit: 1.0
          memoryLimit: 1.073741824
