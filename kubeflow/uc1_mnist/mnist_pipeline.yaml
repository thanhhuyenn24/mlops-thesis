        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model(\n    input_dataset: Input[Dataset],\n    model_name:\
          \ str,\n    run_id: int,\n    epochs: int,\n    learning_rate: float,\n\
          \    batch_size: int,\n    output_model:   Output[Model],\n    output_metrics:\
          \ Output[Metrics],\n):\n    \"\"\"Fine-tune SimpleNN / DeepNN / CNN tr\xEA\
          n MNIST train set.\"\"\"\n    import time\n    import torch\n    import\
          \ torch.nn as nn\n    from torch.utils.data import TensorDataset, DataLoader\n\
          \n    # \u2500\u2500 Model definitions \u2014 gi\u1ED1ng models_mnist.py\
          \ \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\n    class SimpleNN(nn.Module):\n        def __init__(self):\n\
          \            super().__init__()\n            self.fc1  = nn.Linear(784,\
          \ 128)\n            self.fc2  = nn.Linear(128, 10)\n            self.relu\
          \ = nn.ReLU()\n        def forward(self, x):\n            x = x.view(-1,\
          \ 784)\n            return self.fc2(self.relu(self.fc1(x)))\n\n    class\
          \ DeepNN(nn.Module):\n        def __init__(self):\n            super().__init__()\n\
          \            self.fc1     = nn.Linear(784, 512)\n            self.fc2  \
          \   = nn.Linear(512, 256)\n            self.fc3     = nn.Linear(256, 128)\n\
          \            self.fc4     = nn.Linear(128, 10)\n            self.dropout\
          \ = nn.Dropout(0.3)\n            self.relu    = nn.ReLU()\n        def forward(self,\
          \ x):\n            x = x.view(-1, 784)\n            x = self.relu(self.fc1(x));\
          \ x = self.dropout(x)\n            x = self.relu(self.fc2(x)); x = self.dropout(x)\n\
          \            x = self.relu(self.fc3(x))\n            return self.fc4(x)\n\
          \n    class CNN(nn.Module):\n        def __init__(self):\n            super().__init__()\n\
          \            self.conv1   = nn.Conv2d(1, 32, kernel_size=3, padding=1)\n\
          \            self.bn1     = nn.BatchNorm2d(32)\n            self.conv2 \
          \  = nn.Conv2d(32, 64, kernel_size=3, padding=1)\n            self.bn2 \
          \    = nn.BatchNorm2d(64)\n            self.pool    = nn.MaxPool2d(2, 2)\n\
          \            self.fc1     = nn.Linear(64 * 7 * 7, 128)\n            self.fc2\
          \     = nn.Linear(128, 10)\n            self.relu    = nn.ReLU()\n     \
          \       self.dropout = nn.Dropout(0.3)\n        def forward(self, x):\n\
          \            x = self.pool(self.relu(self.bn1(self.conv1(x))))\n       \
          \     x = self.pool(self.relu(self.bn2(self.conv2(x))))\n            x =\
          \ x.view(-1, 64 * 7 * 7)\n            return self.fc2(self.dropout(self.relu(self.fc1(x))))\n\
          \n    MODEL_CLASSES = {\"SimpleNN\": SimpleNN, \"DeepNN\": DeepNN, \"CNN\"\
          : CNN}\n\n    # \u2500\u2500 Load data \u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\n    data         = torch.load(input_dataset.path)\n\
          \    train_images = data[\"train_images\"].unsqueeze(1)  # (N,1,28,28) cho\
          \ CNN\n    train_labels = data[\"train_labels\"]\n\n    train_ds     = TensorDataset(train_images,\
          \ train_labels)\n    train_loader = DataLoader(train_ds, batch_size=batch_size,\
          \ shuffle=True)\n\n    # \u2500\u2500 Train \u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n   \
          \ model     = MODEL_CLASSES[model_name]()\n    optimizer = torch.optim.Adam(model.parameters(),\
          \ lr=learning_rate)\n    criterion = nn.CrossEntropyLoss()\n\n    print(f\"\
          [train] model={model_name} run={run_id} epochs={epochs} lr={learning_rate}\
          \ batch={batch_size}\")\n\n    t0 = time.time()\n    for epoch in range(epochs):\n\
          \        model.train()\n        total_loss = 0.0\n        for images, labels\
          \ in train_loader:\n            optimizer.zero_grad()\n            loss\
          \ = criterion(model(images), labels)\n            loss.backward()\n    \
          \        optimizer.step()\n            total_loss += loss.item()\n     \
          \   avg_loss = total_loss / len(train_loader)\n        print(f\"  Epoch\
