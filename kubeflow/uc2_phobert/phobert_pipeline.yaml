# PIPELINE DEFINITION
# Name: phobert-sentiment-kubeflow
# Description: UC2 PhoBERT fine-tune — UIT-VSFC full, 3 epochs, CPU
# Outputs:
#    evaluate-model-output_metrics: system.Metrics
#    train-model-output_metrics: system.Metrics
components:
  comp-evaluate-model:
    executorLabel: exec-evaluate-model
    inputDefinitions:
      artifacts:
        input_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        input_test_tok:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        output_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
  comp-load-data:
    executorLabel: exec-load-data
    outputDefinitions:
      artifacts:
        output_test:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        output_train:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        output_val:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-preprocess:
    executorLabel: exec-preprocess
    inputDefinitions:
      artifacts:
        input_test:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        input_train:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        input_val:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        output_test_tok:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        output_train_tok:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        output_val_tok:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-train-model:
    executorLabel: exec-train-model
    inputDefinitions:
      artifacts:
        input_train_tok:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        input_val_tok:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        output_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        output_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-evaluate-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location --index-url https://download.pytorch.org/whl/cpu\
          \ --extra-index-url https://pypi.org/simple --trusted-host https://download.pytorch.org/whl/cpu\
          \ --trusted-host https://pypi.org/simple 'kfp==2.9.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple\
          \ --trusted-host https://download.pytorch.org/whl/cpu --trusted-host https://pypi.org/simple\
          \ 'numpy<2.0' 'torch==2.2.2+cpu' 'transformers==4.44.0' 'datasets==2.19.0'\
          \ 'scikit-learn==1.4.2' 'pyarrow==14.0.2' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model(\n    input_test_tok: Input[Dataset],\n    input_model:\
          \    Input[Model],\n    output_metrics: Output[Metrics],\n):\n    \"\"\"\
          Evaluate tr\xEAn test set, log accuracy + F1-macro.\"\"\"\n    import time\n\
          \    import torch\n    import torch.nn as nn\n    from torch.utils.data\
          \ import TensorDataset, DataLoader\n    from transformers import AutoModel\n\
          \    from sklearn.metrics import accuracy_score, f1_score\n\n    PHOBERT_MODEL_NAME\
          \ = \"vinai/phobert-base\"\n    NUM_LABELS         = 3\n    BATCH_SIZE \
          \        = 8\n\n    test_data = torch.load(input_test_tok.path)\n    test_ds\
          \   = TensorDataset(\n        test_data['input_ids'],\n        test_data['attention_mask'],\n\
          \        test_data['labels'],\n    )\n    test_loader = DataLoader(test_ds,\
          \ batch_size=BATCH_SIZE)\n\n    class PhoBERTClassifier(nn.Module):\n  \
          \      def __init__(self):\n            super().__init__()\n           \
          \ self.phobert    = AutoModel.from_pretrained(PHOBERT_MODEL_NAME)\n    \
          \        self.classifier = nn.Linear(768, NUM_LABELS)\n\n        def forward(self,\
          \ input_ids, attention_mask):\n            out = self.phobert(input_ids=input_ids,\
          \ attention_mask=attention_mask)\n            return self.classifier(out.last_hidden_state[:,\
          \ 0, :])\n\n    device = torch.device('cpu')\n    model  = PhoBERTClassifier().to(device)\n\
          \    model.load_state_dict(torch.load(input_model.path, map_location=device))\n\
          \    model.eval()\n\n    all_preds, all_labels = [], []\n    t0 = time.time()\n\
          \    with torch.no_grad():\n        for input_ids, attention_mask, labels\
          \ in test_loader:\n            preds = model(input_ids.to(device), attention_mask.to(device)).argmax(dim=1).cpu()\n\
          \            all_preds.extend(preds.numpy())\n            all_labels.extend(labels.numpy())\n\
          \n    eval_time = round(time.time() - t0, 3)\n    accuracy  = round(accuracy_score(all_labels,\
          \ all_preds) * 100, 4)\n    f1        = round(f1_score(all_labels, all_preds,\
          \ average='macro') * 100, 4)\n\n    print(f\"[evaluate] Accuracy:  {accuracy:.4f}%\"\
          )\n    print(f\"[evaluate] F1-macro:  {f1:.4f}%\")\n    print(f\"[evaluate]\
          \ Eval time: {eval_time}s\")\n\n    output_metrics.log_metric(\"accuracy\"\
          ,          accuracy)\n    output_metrics.log_metric(\"f1_macro\",      \
          \    f1)\n    output_metrics.log_metric(\"eval_time_seconds\", eval_time)\n\
          \n"
        image: python:3.11-slim
        resources:
          cpuLimit: 2.0
          memoryLimit: 8.589934592
    exec-load-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - load_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location --index-url https://download.pytorch.org/whl/cpu\
          \ --extra-index-url https://pypi.org/simple --trusted-host https://download.pytorch.org/whl/cpu\
          \ --trusted-host https://pypi.org/simple 'kfp==2.9.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple\
          \ --trusted-host https://download.pytorch.org/whl/cpu --trusted-host https://pypi.org/simple\
          \ 'numpy<2.0' 'torch==2.2.2+cpu' 'transformers==4.44.0' 'datasets==2.19.0'\
          \ 'scikit-learn==1.4.2' 'pyarrow==14.0.2' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef load_data(\n    output_train: Output[Dataset],\n    output_val:\
          \   Output[Dataset],\n    output_test:  Output[Dataset],\n):\n    \"\"\"\
          Load UIT-VSFC, save d\u01B0\u1EDBi d\u1EA1ng JSON \u2014 kh\xF4ng d\xF9\
          ng pickle.\"\"\"\n    import time\n    import json\n    from datasets import\
          \ load_dataset\n\n    t0 = time.time()\n    print(\"[load_data] Loading\
          \ UIT-VSFC from HuggingFace...\")\n\n    dataset  = load_dataset(\"uitnlp/vietnamese_students_feedback\"\
          )\n    train_ds = dataset['train']\n    val_ds   = dataset['validation']\n\
          \    test_ds  = dataset['test']\n\n    print(f\"[load_data] Train: {len(train_ds)},\
          \ Val: {len(val_ds)}, Test: {len(test_ds)}\")\n\n    def save_json(ds, path):\n\
          \        data = [{\"sentence\": row[\"sentence\"], \"sentiment\": int(row[\"\
          sentiment\"])}\n                for row in ds]\n        with open(path,\
          \ 'w', encoding='utf-8') as f:\n            json.dump(data, f, ensure_ascii=False)\n\
          \n    save_json(train_ds, output_train.path)\n    save_json(val_ds,   output_val.path)\n\
          \    save_json(test_ds,  output_test.path)\n\n    elapsed = round(time.time()\
          \ - t0, 3)\n    print(f\"[load_data] done. time={elapsed}s\")\n\n"
        image: python:3.11-slim
        resources:
          cpuLimit: 2.0
          memoryLimit: 4.294967296
    exec-preprocess:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - preprocess
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location --index-url https://download.pytorch.org/whl/cpu\
          \ --extra-index-url https://pypi.org/simple --trusted-host https://download.pytorch.org/whl/cpu\
          \ --trusted-host https://pypi.org/simple 'kfp==2.9.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple\
          \ --trusted-host https://download.pytorch.org/whl/cpu --trusted-host https://pypi.org/simple\
          \ 'numpy<2.0' 'torch==2.2.2+cpu' 'transformers==4.44.0' 'datasets==2.19.0'\
          \ 'scikit-learn==1.4.2' 'pyarrow==14.0.2' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocess(\n    input_train: Input[Dataset],\n    input_val:\
          \   Input[Dataset],\n    input_test:  Input[Dataset],\n    output_train_tok:\
          \ Output[Dataset],\n    output_val_tok:   Output[Dataset],\n    output_test_tok:\
          \  Output[Dataset],\n):\n    \"\"\"Tokenize v\u1EDBi PhoBERT tokenizer,\
          \ save tensors d\u01B0\u1EDBi d\u1EA1ng .pt.\"\"\"\n    import time\n  \
          \  import json\n    import torch\n    from transformers import AutoTokenizer\n\
          \n    PHOBERT_MODEL_NAME = \"vinai/phobert-base\"\n    MAX_LENGTH      \
          \   = 256\n\n    t0 = time.time()\n    print(\"[preprocess] Loading tokenizer...\"\
          )\n    tokenizer = AutoTokenizer.from_pretrained(PHOBERT_MODEL_NAME)\n\n\
          \    def load_and_tokenize(path, output_path):\n        with open(path,\
          \ 'r', encoding='utf-8') as f:\n            data = json.load(f)\n\n    \
          \    sentences  = [d[\"sentence\"] for d in data]\n        sentiments =\
          \ [d[\"sentiment\"] for d in data]\n\n        encoded = tokenizer(\n   \
          \         sentences,\n            padding='max_length',\n            truncation=True,\n\
          \            max_length=MAX_LENGTH,\n            return_tensors='pt',\n\
          \        )\n\n        result = {\n            'input_ids':      encoded['input_ids'],\n\
          \            'attention_mask': encoded['attention_mask'],\n            'labels':\
          \         torch.tensor(sentiments, dtype=torch.long),\n        }\n     \
          \   torch.save(result, output_path)\n        print(f\"  Tokenized {len(sentences)}\
          \ samples\")\n\n    load_and_tokenize(input_train.path, output_train_tok.path)\n\
          \    load_and_tokenize(input_val.path,   output_val_tok.path)\n    load_and_tokenize(input_test.path,\
          \  output_test_tok.path)\n\n    elapsed = round(time.time() - t0, 3)\n \
          \   print(f\"[preprocess] done. time={elapsed}s\")\n\n"
        image: python:3.11-slim
        resources:
          cpuLimit: 2.0
          memoryLimit: 8.589934592
    exec-train-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location --index-url https://download.pytorch.org/whl/cpu\
          \ --extra-index-url https://pypi.org/simple --trusted-host https://download.pytorch.org/whl/cpu\
          \ --trusted-host https://pypi.org/simple 'kfp==2.9.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple\
          \ --trusted-host https://download.pytorch.org/whl/cpu --trusted-host https://pypi.org/simple\
          \ 'numpy<2.0' 'torch==2.2.2+cpu' 'transformers==4.44.0' 'datasets==2.19.0'\
          \ 'scikit-learn==1.4.2' 'pyarrow==14.0.2' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model(\n    input_train_tok: Input[Dataset],\n    input_val_tok:\
          \   Input[Dataset],\n    output_model:    Output[Model],\n    output_metrics:\
          \  Output[Metrics],\n):\n    \"\"\"Fine-tune PhoBERT-base + Linear(768\u2192\
          3).\"\"\"\n    import time\n    import torch\n    import torch.nn as nn\n\
          \    from torch.utils.data import TensorDataset, DataLoader\n    from transformers\
          \ import AutoModel\n    from torch.optim import AdamW\n\n    PHOBERT_MODEL_NAME\
          \ = \"vinai/phobert-base\"\n    NUM_LABELS         = 3\n    LR         \
          \        = 2e-5\n    BATCH_SIZE         = 8\n    EPOCHS             = 3\n\
          \    WEIGHT_DECAY       = 0.01\n\n    train_data = torch.load(input_train_tok.path)\n\
          \    val_data   = torch.load(input_val_tok.path)\n\n    train_ds = TensorDataset(\n\
          \        train_data['input_ids'],\n        train_data['attention_mask'],\n\
          \        train_data['labels'],\n    )\n    val_ds = TensorDataset(\n   \
          \     val_data['input_ids'],\n        val_data['attention_mask'],\n    \
          \    val_data['labels'],\n    )\n\n    train_loader = DataLoader(train_ds,\
          \ batch_size=BATCH_SIZE, shuffle=True)\n    val_loader   = DataLoader(val_ds,\
          \   batch_size=BATCH_SIZE)\n\n    class PhoBERTClassifier(nn.Module):\n\
          \        def __init__(self):\n            super().__init__()\n         \
          \   self.phobert    = AutoModel.from_pretrained(PHOBERT_MODEL_NAME)\n  \
          \          self.classifier = nn.Linear(768, NUM_LABELS)\n            self.phobert.gradient_checkpointing_enable()\n\
          \n        def forward(self, input_ids, attention_mask):\n            out\
          \ = self.phobert(input_ids=input_ids, attention_mask=attention_mask)\n \
          \           return self.classifier(out.last_hidden_state[:, 0, :])\n\n \
          \   torch.manual_seed(42)\n    device    = torch.device('cpu')\n    model\
          \     = PhoBERTClassifier().to(device)\n    optimizer = AdamW(model.parameters(),\
          \ lr=LR, weight_decay=WEIGHT_DECAY)\n    criterion = nn.CrossEntropyLoss()\n\
          \n    print(f\"[train] epochs={EPOCHS} lr={LR} batch={BATCH_SIZE} device=cpu\"\
          )\n\n    t0 = time.time()\n    avg_loss = 0.0\n    for epoch in range(EPOCHS):\n\
          \        model.train()\n        total_loss = 0\n        for input_ids, attention_mask,\
          \ labels in train_loader:\n            input_ids      = input_ids.to(device)\n\
          \            attention_mask = attention_mask.to(device)\n            labels\
          \         = labels.to(device)\n            optimizer.zero_grad()\n     \
          \       loss = criterion(model(input_ids, attention_mask), labels)\n   \
          \         loss.backward()\n            optimizer.step()\n            total_loss\
          \ += loss.item()\n\n        avg_loss = total_loss / len(train_loader)\n\n\
          \        model.eval()\n        val_loss = 0\n        with torch.no_grad():\n\
          \            for input_ids, attention_mask, labels in val_loader:\n    \
          \            input_ids      = input_ids.to(device)\n                attention_mask\
          \ = attention_mask.to(device)\n                labels         = labels.to(device)\n\
          \                val_loss      += criterion(model(input_ids, attention_mask),\
          \ labels).item()\n\n        print(f\"  Epoch {epoch+1}/{EPOCHS} \u2014 train_loss:\
          \ {avg_loss:.4f}, val_loss: {val_loss/len(val_loader):.4f}\")\n\n    train_time\
          \ = round(time.time() - t0, 3)\n    print(f\"[train] done. train_time={train_time}s\"\
          )\n\n    torch.save(model.state_dict(), output_model.path)\n    output_metrics.log_metric(\"\
          train_time_seconds\", train_time)\n    output_metrics.log_metric(\"final_loss\"\
          ,         round(avg_loss, 4))\n\n"
        image: python:3.11-slim
        resources:
          cpuLimit: 4.0
          memoryLimit: 12.884901888
pipelineInfo:
  description: "UC2 PhoBERT fine-tune \u2014 UIT-VSFC full, 3 epochs, CPU"
  name: phobert-sentiment-kubeflow
root:
  dag:
    outputs:
      artifacts:
        evaluate-model-output_metrics:
          artifactSelectors:
          - outputArtifactKey: output_metrics
            producerSubtask: evaluate-model
        train-model-output_metrics:
          artifactSelectors:
          - outputArtifactKey: output_metrics
            producerSubtask: train-model
    tasks:
      evaluate-model:
        cachingOptions: {}
        componentRef:
          name: comp-evaluate-model
        dependentTasks:
        - preprocess
        - train-model
        inputs:
          artifacts:
            input_model:
              taskOutputArtifact:
                outputArtifactKey: output_model
                producerTask: train-model
            input_test_tok:
              taskOutputArtifact:
                outputArtifactKey: output_test_tok
                producerTask: preprocess
        taskInfo:
          name: evaluate-model
      load-data:
        cachingOptions: {}
        componentRef:
          name: comp-load-data
        taskInfo:
          name: load-data
      preprocess:
        cachingOptions: {}
        componentRef:
          name: comp-preprocess
        dependentTasks:
        - load-data
        inputs:
          artifacts:
            input_test:
              taskOutputArtifact:
                outputArtifactKey: output_test
                producerTask: load-data
            input_train:
              taskOutputArtifact:
                outputArtifactKey: output_train
                producerTask: load-data
            input_val:
              taskOutputArtifact:
                outputArtifactKey: output_val
                producerTask: load-data
        taskInfo:
          name: preprocess
      train-model:
        cachingOptions: {}
        componentRef:
          name: comp-train-model
        dependentTasks:
        - preprocess
        inputs:
          artifacts:
            input_train_tok:
              taskOutputArtifact:
                outputArtifactKey: output_train_tok
                producerTask: preprocess
            input_val_tok:
              taskOutputArtifact:
                outputArtifactKey: output_val_tok
                producerTask: preprocess
        taskInfo:
          name: train-model
  outputDefinitions:
    artifacts:
      evaluate-model-output_metrics:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
      train-model-output_metrics:
        artifactType:
          schemaTitle: system.Metrics
          schemaVersion: 0.0.1
schemaVersion: 2.1.0
sdkVersion: kfp-2.9.0
