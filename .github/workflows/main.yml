name: MLOps CI/CD Pipeline
on:
  push:
    branches: [main]
    paths:
      - 'airflow/**'
      - 'kubeflow/**'
      - 'mlflow/**'
      - 'metaflow/**'
      - 'shared/**'
  workflow_dispatch:

jobs:
  airflow_job:
    name: Airflow DAG Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync DAGs to Airflow server via rsync
        env:
          SSH_KEY: ${{ secrets.AIRFLOW_SSH_KEY }}
          AIRFLOW_HOST: ${{ secrets.AIRFLOW_HOST }}
        run: |
          echo "$SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

          rsync -avz -e "ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no" \
            airflow/ \
            root@$AIRFLOW_HOST:/home/airflow/airflowServer/dags/

          rsync -avz -e "ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no" \
            shared/ \
            root@$AIRFLOW_HOST:/home/airflow/airflowServer/dags/shared/

          ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no root@$AIRFLOW_HOST \
            "chown -R airflow:airflow /home/airflow/airflowServer/dags/"

  kubeflow_job:
    name: Kubeflow Pipeline Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install KFP SDK
        run: pip install kfp==2.4.0

      - name: Show changed Kubeflow files
        run: |
          echo "Changed files in kubeflow/:"
          git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
            | grep '^kubeflow/' || echo "(none)"

      - name: Notify Kubeflow pipeline change
        run: |
          echo "================================================"
          echo "Kubeflow pipeline files updated."
          echo "Cluster: OpenStack VM (not accessible from CI)"
          echo "Action: manually re-run pipeline on KFP UI"
          echo "  UC1 MNIST   : kubeflow/uc1_mnist/pipeline.py"
          echo "  UC2 PhoBERT : kubeflow/uc2_phobert/pipeline.py"
          echo "================================================"

      - name: Compile UC1 MNIST pipeline
        run: |
          cd kubeflow/uc1_mnist
          python3 pipeline.py
          echo "UC1 compiled: mnist_pipeline.yaml"

      - name: Compile UC2 PhoBERT pipeline
        run: |
          if [ -f kubeflow/uc2_phobert/pipeline.py ]; then
            cd kubeflow/uc2_phobert
            python3 pipeline.py
            echo "UC2 compiled: phobert_pipeline.yaml"
          else
            echo "UC2 not yet available, skipping."
          fi

      - name: Upload compiled pipelines as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kfp-compiled-pipelines
          path: |
            kubeflow/uc1_mnist/mnist_pipeline.yaml
            kubeflow/uc2_phobert/phobert_pipeline.yaml
          if-no-files-found: ignore
          retention-days: 30

  mlflow_job:
    name: MLflow Code Sync to GCP VM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync MLflow code to GCP VM (mlflow-server)
        env:
          SSH_KEY: ${{ secrets.MLFLOW_SSH_KEY }}
          MLFLOW_HOST: ${{ secrets.MLFLOW_HOST }}
        run: |
          echo "$SSH_KEY" > /tmp/ssh_key_mlflow
          chmod 600 /tmp/ssh_key_mlflow

          ssh -i /tmp/ssh_key_mlflow -o StrictHostKeyChecking=no \
            doanthao0103@$MLFLOW_HOST \
            "mkdir -p ~/mlops-thesis/mlflow ~/mlops-thesis/shared"

          rsync -avz -e "ssh -i /tmp/ssh_key_mlflow -o StrictHostKeyChecking=no" \
            shared/ doanthao0103@$MLFLOW_HOST:~/mlops-thesis/shared/

          rsync -avz -e "ssh -i /tmp/ssh_key_mlflow -o StrictHostKeyChecking=no" \
            mlflow/ doanthao0103@$MLFLOW_HOST:~/mlops-thesis/mlflow/

          echo "================================================"
          echo "MLflow VM sync complete: doanthao0103@$MLFLOW_HOST"
          echo "  ~/mlops-thesis/shared/"
          echo "  ~/mlops-thesis/mlflow/"
          echo "================================================"

  metaflow_job:
    name: Metaflow Code Sync to GCP VM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Metaflow code to GCP VM (metaflow-server)
        env:
          SSH_KEY: ${{ secrets.METAFLOW_SSH_KEY }}
          METAFLOW_HOST: ${{ secrets.METAFLOW_HOST }}
        run: |
          echo "$SSH_KEY" > /tmp/ssh_key_metaflow
          chmod 600 /tmp/ssh_key_metaflow

          ssh -i /tmp/ssh_key_metaflow -o StrictHostKeyChecking=no \
            doanthao0103@$METAFLOW_HOST \
            "mkdir -p ~/mlops-thesis/metaflow ~/mlops-thesis/shared"

          rsync -avz -e "ssh -i /tmp/ssh_key_metaflow -o StrictHostKeyChecking=no" \
            shared/ doanthao0103@$METAFLOW_HOST:~/mlops-thesis/shared/

          rsync -avz -e "ssh -i /tmp/ssh_key_metaflow -o StrictHostKeyChecking=no" \
            metaflow/ doanthao0103@$METAFLOW_HOST:~/mlops-thesis/metaflow/

          echo "================================================"
          echo "Metaflow VM sync complete: doanthao0103@$METAFLOW_HOST"
          echo "  ~/mlops-thesis/shared/"
          echo "  ~/mlops-thesis/metaflow/"
          echo "================================================"